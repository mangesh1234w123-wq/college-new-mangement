<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | CollegeOS</title>
    <meta name="description" content="Role-based college management dashboard for admin, faculty, and students." />
    <meta property="og:title" content="College Management System" />
    <meta property="og:description" content="Role-based college management dashboard for admin, faculty, and students." />
    <meta property="og:image" content="https://og-image.vercel.app/College%20Management%20System.png" />
    <meta property="og:site_name" content="College Management System" />
    <meta property="og:url" content="https://college-management-system-main-gamma.vercel.app/forgot-password.html" />
    <link rel="canonical" href="https://college-management-system-main-gamma.vercel.app/forgot-password.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="College Management System" />
    <meta name="twitter:description" content="Role-based college management dashboard for admin, faculty, and students." />
    <meta name="twitter:image" content="https://og-image.vercel.app/College%20Management%20System.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/app.js"></script>
  </head>
  <body class="auth-page" data-page="forgot-password">
    <main class="auth-shell">
      <section class="auth-brand">
        <a class="brand-link" href="login.html">CollegeOS</a>
        <h1>Generate a secure reset link in demo mode.</h1>
        <p>The backend returns a simulated reset link and logs it to the server console for testing.</p>
      </section>
      <section class="auth-card">
        <div class="panel-heading">
          <span class="eyebrow">Password recovery</span>
          <h2>Forgot password</h2>
        </div>
        <form id="forgotPasswordForm" class="stack-form">
          <label class="field">
            <span>Registered email</span>
            <input type="email" name="email" placeholder="name@college.edu" required />
          </label>
          <button class="button button-primary" type="submit">Generate Reset Link</button>
        </form>
        <div id="forgotPasswordResult" class="result-panel hidden"></div>
        <div class="auth-links">
          <a href="login.html">Back to login</a>
        </div>
      </section>
    </main>
  </body>
</html>
